name: Update Google Scholar Stats

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "10 5 * * *"

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Validate required secrets
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          if [ -z "$GOOGLE_SCHOLAR_ID" ]; then
            echo "Missing secret: GOOGLE_SCHOLAR_ID"
            exit 1
          fi
          if [ -z "$SERPAPI_KEY" ]; then
            echo "Missing secret: SERPAPI_KEY"
            exit 1
          fi

      - name: Fetch Google Scholar data
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          cd google_scholar_crawler
          pip install -r requirements.txt
          python main.py

      - name: Publish stats to google-scholar-stats branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd google_scholar_crawler/results
          git init
          git checkout -b google-scholar-stats
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Update Google Scholar stats" || echo "No changes to commit"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin google-scholar-stats --force
