<script>
  document.addEventListener("DOMContentLoaded", function () {
    function loadJson(urls) {
      if (!urls.length) {
        return Promise.reject(new Error("No Google Scholar data URL available"));
      }

      var url = urls[0];
      return fetch(url)
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Failed to load Google Scholar stats");
          }
          return response.json();
        })
        .catch(function () {
          return loadJson(urls.slice(1));
        });
    }

    function getTotalCitations(data) {
      if (data && data.citedby !== undefined) {
        return data.citedby;
      }

      var citedByTable = (((data || {}).cited_by || {}).table) || [];
      if (citedByTable.length && citedByTable[0].citations) {
        return citedByTable[0].citations.all || 0;
      }

      return undefined;
    }

    function normalizeTitle(title) {
      return (title || "")
        .toLowerCase()
        .replace(/&amp;/g, "and")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildPublicationMap(data) {
      var publications = data.publications || {};
      if (Object.keys(publications).length > 0) {
        return publications;
      }

      var articles = data.articles || [];
      var publicationMap = {};
      articles.forEach(function (article) {
        var citationId = article.citation_id || article.author_pub_id;
        if (!citationId) {
          return;
        }

        if (article.num_citations === undefined) {
          article.num_citations = ((article.cited_by || {}).value) || 0;
        }
        publicationMap[citationId] = article;
      });
      return publicationMap;
    }

    function buildTitleIndex(publications) {
      var index = {};
      Object.keys(publications || {}).forEach(function (key) {
        var publication = publications[key] || {};
        var normalized = normalizeTitle(publication.title);
        if (normalized && !index[normalized]) {
          index[normalized] = publication;
        }
      });
      return index;
    }

    function matchByTitle(titleIndex, rawTitle) {
      var normalized = normalizeTitle(rawTitle);
      if (!normalized) {
        return null;
      }

      if (titleIndex[normalized]) {
        return titleIndex[normalized];
      }

      var keys = Object.keys(titleIndex);
      for (var i = 0; i < keys.length; i += 1) {
        if (keys[i].includes(normalized) || normalized.includes(keys[i])) {
          return titleIndex[keys[i]];
        }
      }

      return null;
    }

    function createLink(label, href) {
      var link = document.createElement("a");
      link.href = href;
      link.textContent = label;
      return link;
    }

    var rawDataUrl = "https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json";
    var cdnDataUrl = "https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json";
    {% if site.google_scholar_stats_use_cdn %}
    var dataUrls = [cdnDataUrl, rawDataUrl];
    {% else %}
    var dataUrls = [rawDataUrl, cdnDataUrl];
    {% endif %}

    loadJson(dataUrls)
      .then(function (data) {
        var totalCitation = getTotalCitations(data);
        var totalCitElement = document.getElementById("total_cit");
        var publications = buildPublicationMap(data || {});
        var titleIndex = buildTitleIndex(publications);

        if (totalCitElement && totalCitation !== undefined) {
          totalCitElement.textContent = totalCitation;
        }

        var citationElements = document.getElementsByClassName("show_paper_citations");
        Array.prototype.forEach.call(citationElements, function (element) {
          var paperId = element.getAttribute("data");
          var paperTitle = element.getAttribute("data-title");
          var publication = null;

          if (paperId && publications[paperId]) {
            publication = publications[paperId];
          } else if (paperTitle) {
            publication = matchByTitle(titleIndex, paperTitle);
          }

          if (!publication) {
            return;
          }

          var numCitations = publication.num_citations;
          if (numCitations === null || numCitations === undefined || numCitations === "") {
            return;
          }

          var citationValue = Number(numCitations);
          if (!Number.isNaN(citationValue) && citationValue >= 0) {
            element.textContent = "Citations: " + citationValue;
            element.classList.add("citation-stat");
          }
        });

        var paperDownloadElements = document.getElementsByClassName("show_paper_download");
        Array.prototype.forEach.call(paperDownloadElements, function (element) {
          var paperId = element.getAttribute("data");
          var paperTitle = element.getAttribute("data-title");
          var publication = null;

          if (paperId && publications[paperId]) {
            publication = publications[paperId];
          } else if (paperTitle) {
            publication = matchByTitle(titleIndex, paperTitle);
          }

          if (!publication || !publication.link) {
            return;
          }

          element.innerHTML = "";
          element.appendChild(createLink("Download Paper", publication.link));
        });
      })
      .catch(function () {});
  });
</script>
